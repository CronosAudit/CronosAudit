trigger:
  branches:
    include:
    - main
    - develop
  paths:
    exclude:
    - README.md
    - DEPLOYMENT.md

pr:
  branches:
    include:
    - main
    - develop

pool:
  vmImage: 'ubuntu-latest'

variables:
  nodeVersion: '20.x'
  buildConfiguration: 'Release'

stages:
- stage: Validate
  displayName: 'Validate & Lint'
  jobs:
  - job: ValidateJob
    displayName: 'Lint & Type Check'
    steps:
    - task: NodeTool@0
      inputs:
        versionSpec: $(nodeVersion)
    
    - task: Npm@1
      displayName: 'Install Dependencies'
      inputs:
        command: 'ci'
    
    - task: Npm@1
      displayName: 'Run ESLint'
      inputs:
        command: 'custom'
        customCommand: 'run lint'
    
    - task: Npm@1
      displayName: 'TypeScript Type Check'
      inputs:
        command: 'custom'
        customCommand: 'run tsc -- --noEmit'
      continueOnError: true

- stage: Build
  displayName: 'Build & Test'
  dependsOn: Validate
  condition: succeeded()
  jobs:
  - job: BuildJob
    displayName: 'Build Application'
    steps:
    - task: NodeTool@0
      inputs:
        versionSpec: $(nodeVersion)
    
    - task: Npm@1
      displayName: 'Install Dependencies'
      inputs:
        command: 'ci'
    
    - task: Bash@3
      displayName: 'Create Environment File'
      inputs:
        targetType: 'inline'
        script: |
          echo "Creating .env.local for build..."
          cat > .env.local << EOF
          NEXT_PUBLIC_SUPABASE_URL=$(SUPABASE_URL)
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY=$(SUPABASE_KEY)
          NEXT_PUBLIC_SUPABASE_ANON_KEY=$(SUPABASE_ANON_KEY)
          API_KEY_OPEN_AI=$(OPENAI_KEY)
          CHRONOS_REPORT_API_URL=$(CHRONOS_REPORT_URL)
          CHRONOS_UPLOAD_API_URL=$(CHRONOS_UPLOAD_URL)
          CNPJA_API_KEY=$(CNPJA_KEY)
          EOF
    
    - task: Npm@1
      displayName: 'Build Application'
      inputs:
        command: 'custom'
        customCommand: 'run build'
    
    - task: PublishBuildArtifacts@1
      displayName: 'Publish Build Artifacts'
      inputs:
        PathtoPublish: '$(Build.SourcesDirectory)/.next'
        ArtifactName: 'next-build'
        publishLocation: 'Container'
    
    - task: PublishBuildArtifacts@1
      displayName: 'Publish Package Files'
      inputs:
        PathtoPublish: '$(Build.SourcesDirectory)/package.json'
        ArtifactName: 'package-files'
        publishLocation: 'Container'

- stage: Security
  displayName: 'Security Scan'
  dependsOn: Build
  condition: succeeded()
  jobs:
  - job: SecurityScanJob
    displayName: 'Vulnerability Scan'
    steps:
    - task: NodeTool@0
      inputs:
        versionSpec: $(nodeVersion)
    
    - task: Npm@1
      displayName: 'Install Dependencies'
      inputs:
        command: 'ci'
    
    - task: Bash@3
      displayName: 'Run npm audit'
      inputs:
        targetType: 'inline'
        script: 'npm audit --production'
      continueOnError: true
    
    - task: dependency-check.dependency-check_build-task.dependency-check-build-task.DependencyCheck@6
      displayName: 'OWASP Dependency Check'
      inputs:
        projectName: 'Cronos Audit'
        scanPath: '$(Build.SourcesDirectory)'
        format: 'JSON'
        args: '--enableExperimental'
      continueOnError: true

- stage: DeployStaging
  displayName: 'Deploy to Staging'
  dependsOn: [Build, Security]
  condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/develop'))
  jobs:
  - deployment: DeployToStaging
    environment: 'Staging'
    strategy:
      runOnce:
        deploy:
          steps:
          - task: DownloadBuildArtifacts@0
            inputs:
              artifactName: 'next-build'
              downloadPath: '$(Pipeline.Workspace)'
          
          - task: DownloadBuildArtifacts@0
            inputs:
              artifactName: 'package-files'
              downloadPath: '$(Pipeline.Workspace)'
          
          - task: AzureWebApp@1
            displayName: 'Deploy to Azure App Service - Staging'
            inputs:
              azureSubscription: '$(AZURE_SUBSCRIPTION_STAGING)'
              appName: '$(AZURE_APP_NAME_STAGING)'
              appType: 'webAppLinux'
              package: '$(Pipeline.Workspace)'
              runtimeStack: 'NODE|20-lts'
              startupCommand: 'npm start'
          
          - task: AzureAppServiceManage@0
            displayName: 'Warm up Application'
            inputs:
              azureSubscription: '$(AZURE_SUBSCRIPTION_STAGING)'
              Action: 'Restart Azure App Service'
              WebAppName: '$(AZURE_APP_NAME_STAGING)'

- stage: DeployProduction
  displayName: 'Deploy to Production'
  dependsOn: [Build, Security]
  condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
  jobs:
  - deployment: DeployToProduction
    environment: 'Production'
    strategy:
      runOnce:
        preDeploy:
          steps:
          - task: Bash@3
            displayName: 'Pre-deployment checks'
            inputs:
              targetType: 'inline'
              script: |
                echo "Running pre-deployment health checks..."
                echo "Build ID: $(Build.BuildId)"
                echo "Source Branch: $(Build.SourceBranch)"
                echo "Commit: $(Build.SourceVersion)"
        deploy:
          steps:
          - task: DownloadBuildArtifacts@0
            inputs:
              artifactName: 'next-build'
              downloadPath: '$(Pipeline.Workspace)'
          
          - task: DownloadBuildArtifacts@0
            inputs:
              artifactName: 'package-files'
              downloadPath: '$(Pipeline.Workspace)'
          
          - task: AzureWebApp@1
            displayName: 'Deploy to Azure App Service - Production'
            inputs:
              azureSubscription: '$(AZURE_SUBSCRIPTION_PRODUCTION)'
              appName: '$(AZURE_APP_NAME_PRODUCTION)'
              appType: 'webAppLinux'
              package: '$(Pipeline.Workspace)'
              runtimeStack: 'NODE|20-lts'
              startupCommand: 'npm start'
          
          - task: AzureAppServiceManage@0
            displayName: 'Warm up Application'
            inputs:
              azureSubscription: '$(AZURE_SUBSCRIPTION_PRODUCTION)'
              Action: 'Restart Azure App Service'
              WebAppName: '$(AZURE_APP_NAME_PRODUCTION)'
        postDeploy:
          steps:
          - task: Bash@3
            displayName: 'Post-deployment verification'
            inputs:
              targetType: 'inline'
              script: |
                echo "Verifying production deployment..."
                sleep 10
                curl -f https://$(AZURE_APP_NAME_PRODUCTION).azurewebsites.net/ || exit 1
                echo "✅ Production deployment verified"
